<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>himeapp</title>
  <style>
    :root {
      --bg: #0c0e12;
      --surface: #161a22;
      --text: #eef0f5;
      --muted: #8b92a0;
      --accent: #7c9cff;
      --accent-dim: rgba(124, 156, 255, 0.12);
      --radius: 12px;
    }
    * {
      box-sizing: border-box;
    }
    body {
      margin: 0;
      min-height: 100dvh;
      font-family: system-ui, -apple-system, "Segoe UI", sans-serif;
      background: radial-gradient(ellipse 120% 80% at 50% -20%, rgba(124, 156, 255, 0.08), transparent 55%), var(--bg);
      color: var(--text);
      line-height: 1.5;
      padding: clamp(1.75rem, 6vw, 3rem);
      display: flex;
      flex-direction: column;
    }
    main {
      max-width: 36rem;
      margin: 0 auto;
      width: 100%;
      flex: 1;
    }
    .site-header {
      margin-bottom: 2rem;
      padding-bottom: 1.75rem;
      border-bottom: 1px solid rgba(255, 255, 255, 0.06);
    }
    .brand {
      margin: 0 0 1rem;
      font-size: 0.8125rem;
      font-weight: 600;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--accent);
    }
    .page-title {
      margin: 0;
      font-size: clamp(1.625rem, 4.5vw, 2rem);
      font-weight: 650;
      letter-spacing: -0.03em;
      line-height: 1.2;
    }
    ul {
      list-style: none;
      padding: 0;
      margin: 0;
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
    }
    a.card {
      display: block;
      padding: 0;
      overflow: hidden;
      background: var(--surface);
      border-radius: var(--radius);
      color: inherit;
      text-decoration: none;
      border: 1px solid rgba(255, 255, 255, 0.06);
      transition: border-color 0.15s ease, background 0.15s ease;
    }
    a.card:hover {
      border-color: rgba(124, 156, 255, 0.35);
      background: var(--accent-dim);
    }
    .card-thumb {
      aspect-ratio: 16 / 9;
      background: #0a0c10;
      border-bottom: 1px solid rgba(255, 255, 255, 0.06);
    }
    .card-thumb img {
      display: block;
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: top center;
    }
    .card-body {
      padding: 1rem 1.25rem 1.1rem;
    }
    a.card strong {
      display: block;
      font-size: 1rem;
      margin-bottom: 0.25rem;
    }
    a.card span.url {
      font-size: 0.8rem;
      color: var(--muted);
      word-break: break-all;
    }
    .site-footer {
      max-width: 36rem;
      margin: 2.5rem auto 0;
      width: 100%;
      padding-top: 1.25rem;
      border-top: 1px solid rgba(255, 255, 255, 0.06);
      font-size: 0.8125rem;
    }
    .site-footer a {
      color: var(--muted);
      text-decoration: none;
    }
    .site-footer a:hover {
      color: var(--accent);
    }
  </style>
</head>
<body>
  <main>
    <header class="site-header">
      <p class="brand">himeapp</p>
      <h1 class="page-title">만든 서비스</h1>
    </header>
    <ul>
      <li>
        <a class="card" href="https://himeapp.github.io/pensive-web/mind-cleanse.html" target="_blank" rel="noopener noreferrer">
          <div class="card-thumb" aria-hidden="true">
            <img
              src="https://image.thum.io/get/width/800/crop/450/https://himeapp.github.io/pensive-web/mind-cleanse.html"
              alt=""
              width="800"
              height="450"
              loading="lazy"
              decoding="async"
            />
          </div>
          <div class="card-body">
            <strong>pensive-web에서 마음을 정화하세요</strong>
            <span class="url">himeapp.github.io/pensive-web/mind-cleanse.html</span>
          </div>
        </a>
      </li>
      <li>
        <a class="card" href="https://taro-web-sigma.vercel.app/" target="_blank" rel="noopener noreferrer">
          <div class="card-thumb" aria-hidden="true">
            <img
              src="https://image.thum.io/get/width/800/crop/450/https://taro-web-sigma.vercel.app/"
              alt=""
              width="800"
              height="450"
              loading="lazy"
              decoding="async"
            />
          </div>
          <div class="card-body">
            <strong>타로를 보세요</strong>
            <span class="url">taro-web-sigma.vercel.app</span>
          </div>
        </a>
      </li>
    </ul>
  </main>
  <footer class="site-footer">
    <a href="https://www.instagram.com/himeisreal/" target="_blank" rel="noopener noreferrer">Instagram · @himeisreal</a>
  </footer>
</body>
</html>
