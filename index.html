<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>서비스 모음</title>
  <style>
    :root {
      --bg: #0f1115;
      --surface: #1a1d24;
      --text: #e8eaef;
      --muted: #8b919c;
      --accent: #7c9cff;
      --accent-dim: rgba(124, 156, 255, 0.15);
      --radius: 12px;
    }
    * {
      box-sizing: border-box;
    }
    body {
      margin: 0;
      min-height: 100dvh;
      font-family: system-ui, -apple-system, "Segoe UI", sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.5;
      padding: clamp(1.5rem, 5vw, 3rem);
    }
    main {
      max-width: 36rem;
      margin: 0 auto;
    }
    h1 {
      font-size: clamp(1.5rem, 4vw, 1.75rem);
      font-weight: 600;
      margin: 0 0 0.5rem;
      letter-spacing: -0.02em;
    }
    p.lead {
      margin: 0 0 2rem;
      color: var(--muted);
      font-size: 0.95rem;
    }
    ul {
      list-style: none;
      padding: 0;
      margin: 0;
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
    }
    a.card {
      display: block;
      padding: 1rem 1.25rem;
      background: var(--surface);
      border-radius: var(--radius);
      color: inherit;
      text-decoration: none;
      border: 1px solid rgba(255, 255, 255, 0.06);
      transition: border-color 0.15s ease, background 0.15s ease;
    }
    a.card:hover {
      border-color: rgba(124, 156, 255, 0.35);
      background: var(--accent-dim);
    }
    a.card strong {
      display: block;
      font-size: 1rem;
      margin-bottom: 0.25rem;
    }
    a.card span.url {
      font-size: 0.8rem;
      color: var(--muted);
      word-break: break-all;
    }
  </style>
</head>
<body>
  <main>
    <h1>만든 서비스</h1>
    <p class="lead">@himeisreal</p>
    <ul>
      <li>
        <a class="card" href="https://himeapp.github.io/pensive-web/mind-cleanse.html" target="_blank" rel="noopener noreferrer">
          <strong>pensive-web에서 마음을 정화하세요</strong>
          <span class="url">himeapp.github.io/pensive-web/mind-cleanse.html</span>
        </a>
      </li>
      <li>
        <a class="card" href="https://taro-web-sigma.vercel.app/" target="_blank" rel="noopener noreferrer">
          <strong>타로를 보세요</strong>
          <span class="url">taro-web-sigma.vercel.app</span>
        </a>
      </li>
    </ul>
  </main>
</body>
</html>
