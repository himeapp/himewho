<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>himeapp</title>
  <style>
    :root {
      --bg: #0c0e12;
      --surface: #161a22;
      --text: #eef0f5;
      --muted: #8b92a0;
      --accent: #7c9cff;
      --accent-dim: rgba(124, 156, 255, 0.12);
      --radius: 12px;
      --fs-meta: 0.6875rem;
      --fs-card-sub: 0.8125rem;
      --fs-card-title: 0.9375rem;
      --lh-snug: 1.35;
      --lh-readable: 1.45;
      --text-card-title: rgba(238, 240, 245, 0.76);
      --text-card-sub: rgba(139, 146, 160, 0.52);
      --card-min-height: 7.75rem;
      --card-thumb-w: 9rem;
      --card-body-pad-x: 1rem;
      --card-app-icon-size: 4.85rem;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100dvh;
      font-family: system-ui, -apple-system, "Segoe UI", sans-serif;
      background: radial-gradient(ellipse 120% 80% at 50% -20%, rgba(124, 156, 255, 0.08), transparent 55%), var(--bg);
      color: var(--text);
      line-height: 1.5;
      padding: clamp(1.75rem, 6vw, 3rem);
      display: flex;
      flex-direction: column;
    }
    main { max-width: 36rem; margin: 0 auto; width: 100%; flex: 1; }
    .site-header {
      margin-bottom: 2rem;
      padding-bottom: 1.75rem;
      border-bottom: 1px solid rgba(255, 255, 255, 0.06);
    }
    /* C: 워드마크 우선 — 큰 브랜드 + 작은 섹션 라벨(개성 유지). 카드만 공통 스케일. */
    .header-c {
      display: flex;
      flex-direction: column;
      gap: 0.65rem;
    }
    .header-c .wordmark {
      margin: 0;
      font-size: clamp(1.68rem, 5.4vw, 2.1rem);
      font-weight: 620;
      letter-spacing: -0.04em;
      line-height: 1.05;
      background: linear-gradient(105deg, #f0f2f8 0%, var(--accent) 55%, #b8c9ff 100%);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }
    .header-c h1.section-label {
      margin: 0;
      display: flex;
      align-items: center;
      gap: 0.5rem;
      font-size: 0.6875rem;
      font-weight: 600;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--muted);
    }
    .header-c h1.section-label::before {
      content: "";
      width: 1.25rem;
      height: 1px;
      background: rgba(139, 146, 160, 0.45);
    }
    ul {
      list-style: none;
      padding: 0;
      margin: 0;
      display: flex;
      flex-direction: column;
      gap: 1.1rem;
    }
    .card {
      display: flex;
      flex-direction: row;
      align-items: stretch;
      padding: 0;
      overflow: hidden;
      min-height: var(--card-min-height);
      background: var(--surface);
      border-radius: var(--radius);
      color: inherit;
      text-decoration: none;
      border: 1px solid rgba(255, 255, 255, 0.06);
      transition: border-color 0.15s ease, background 0.15s ease;
    }
    a.card:hover {
      border-color: rgba(124, 156, 255, 0.35);
      background: var(--accent-dim);
    }
    /* 앱: 웹과 같은 thumb 열(9rem) 안에서 스쿼클 아이콘 가로·세로 중앙 */
    .card--app {
      display: grid;
      grid-template-columns: var(--card-thumb-w) 1fr;
      align-items: stretch;
      padding: 0;
    }
    .card-app-thumb-slot {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100%;
    }
    .card--app .card-body--app {
      flex: initial;
      min-width: 0;
      padding: 0.9rem var(--card-body-pad-x);
      display: flex;
      flex-direction: column;
      justify-content: center;
    }
    .card-app-icon {
      flex: 0 0 auto;
      box-sizing: border-box;
      width: var(--card-app-icon-size);
      height: var(--card-app-icon-size);
      padding: 0.38rem;
      border-radius: 1.12rem;
      overflow: hidden;
      background: #0a0c10;
      border: 1px solid rgba(255, 255, 255, 0.08);
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .card-app-icon img {
      display: block;
      width: 100%;
      height: 100%;
      object-fit: contain;
      object-position: center;
      transform: none;
    }
    .card--app-ant .card-app-icon {
      background: #000;
    }
    /* 명상: 완성된 앱 아이콘 PNG만 보이게 (배경·안쪽 여백 중복 제거) */
    .card--app-mantra .card-app-icon {
      padding: 0;
      background: transparent;
      border-color: rgba(255, 255, 255, 0.1);
    }
    .card--app-mantra .card-app-icon img {
      object-fit: cover;
    }
    .card-thumb {
      flex: 0 0 var(--card-thumb-w);
      width: var(--card-thumb-w);
      background: #0a0c10;
      border-right: 1px solid rgba(255, 255, 255, 0.06);
      align-self: stretch;
      min-height: 4.25rem;
      overflow: hidden;
    }
    .card-thumb img {
      display: block;
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center;
      transform: scale(1.52);
    }
    .card-thumb.thumb-mind img {
      transform: scale(2.05);
    }
    .card-body {
      flex: 1;
      min-width: 0;
      min-height: 0;
      padding: 0.9rem var(--card-body-pad-x);
      display: flex;
      flex-direction: column;
      justify-content: center;
    }
    .card strong {
      display: block;
      font-size: var(--fs-card-title);
      font-weight: 560;
      letter-spacing: -0.01em;
      color: var(--text-card-title);
      line-height: var(--lh-snug);
      margin-bottom: 0.28rem;
    }
    .card .card-sub {
      display: block;
      font-size: var(--fs-card-sub);
      color: var(--text-card-sub);
      line-height: var(--lh-readable);
    }
    .card .pet-wrap {
      display: inline-block;
      margin-left: 0.4em;
      vertical-align: middle;
    }
    .card .pet-hand {
      display: block;
      width: 1.34em;
      height: 1.34em;
      transform: rotate(26deg);
      transform-origin: 50% 55%;
    }
    .site-footer {
      max-width: 36rem;
      margin: 2.5rem auto 0;
      width: 100%;
      padding-top: 1.25rem;
      border-top: 1px solid rgba(255, 255, 255, 0.06);
      font-size: var(--fs-meta);
    }
    .site-footer a {
      color: rgba(139, 146, 160, 0.42);
      text-decoration: none;
      transition: color 0.15s ease;
    }
    .site-footer a:hover { color: rgba(139, 146, 160, 0.72); }
  </style>
</head>
<body>
  <main>
    <header class="site-header header-c">
      <p class="wordmark">himeapp</p>
      <h1 class="section-label">만든 서비스</h1>
    </header>
    <ul>
      <li>
        <a class="card" href="https://himeapp.github.io/pensive-web/mind-cleanse.html" target="_blank" rel="noopener noreferrer">
          <div class="card-thumb thumb-mind" aria-hidden="true">
            <img src="thumbnails/mind-cleanse.png" alt="" width="320" height="180" loading="lazy" decoding="async" />
          </div>
          <div class="card-body">
            <strong>마음 정화 공간</strong>
            <span class="card-sub">의식의 흐름을 풀고 관념을 쓰다듬어보세요<span class="pet-wrap"><svg class="pet-hand" viewBox="0 0 24 24" width="30" height="30" aria-hidden="true" xmlns="http://www.w3.org/2000/svg"><path fill="rgba(255, 255, 255, 0.34)" stroke="rgba(255, 255, 255, 0.62)" stroke-width="1.15" stroke-linecap="round" stroke-linejoin="round" d="M9 10.5V5c0-.8.65-1.45 1.45-1.45S12 4.2 12 5v5.5l.85-6.45c.1-.85.8-1.45 1.65-1.35.85.1 1.35.9 1.25 1.75L14 10.5l.65-5.2c.15-.85.95-1.4 1.8-1.25.85.15 1.35.95 1.2 1.8L16 12l.55-4.35c.15-.75.9-1.25 1.65-1.1.75.15 1.25.85 1.1 1.6l-2.1 7.4c-.55 1.95-2.35 3.35-4.45 3.35h-1.8c-2.15 0-3.9-1.75-3.9-3.9v-.75c0-1.05.85-1.9 1.9-1.9h.35z"/></svg></span></span>
          </div>
        </a>
      </li>
      <li>
        <a class="card" href="https://taro-web-sigma.vercel.app/" target="_blank" rel="noopener noreferrer">
          <div class="card-thumb" aria-hidden="true">
            <img src="thumbnails/taro-web.png" alt="" width="320" height="180" loading="lazy" decoding="async" />
          </div>
          <div class="card-body">
            <strong>타로 보기</strong>
            <span class="card-sub">피드백 많이 주시면 용해져요</span>
          </div>
        </a>
      </li>
      <li>
        <a href="#" class="card card--app card--app-mantra" aria-label="명상 생활 - Mantra Reminder (iOS)">
          <div class="card-app-thumb-slot" aria-hidden="true">
            <div class="card-app-icon">
              <img src="thumbnails/mantra-reminder.png" alt="" width="1024" height="1024" loading="lazy" decoding="async" />
            </div>
          </div>
          <div class="card-body card-body--app">
            <strong>명상 생활 - Mantra Reminder (iOS)</strong>
            <span class="card-sub">매일 같은 시간에 만트라 알림을 받아요</span>
          </div>
        </a>
      </li>
      <li>
        <a href="#" class="card card--app card--app-ant" aria-label="개미 풀기 Ant Invader (Android)">
          <div class="card-app-thumb-slot" aria-hidden="true">
            <div class="card-app-icon">
              <img src="thumbnails/ant-invader.png" alt="" width="588" height="588" loading="lazy" decoding="async" />
            </div>
          </div>
          <div class="card-body card-body--app">
            <strong>개미 풀기 Ant Invader (Android)</strong>
            <span class="card-sub">doom scrolling? 개미 떼와 함께하세요</span>
          </div>
        </a>
      </li>
    </ul>
  </main>
  <footer class="site-footer">
    <a href="https://www.instagram.com/himeisreal/" target="_blank" rel="noopener noreferrer">@himeisreal</a>
  </footer>
  <script>
    document.querySelectorAll("a.card--app").forEach(function (el) {
      el.addEventListener("click", function (e) {
        e.preventDefault();
        alert("심사 중이에요.. 기다려 주세요!");
      });
    });
  </script>
</body>
</html>
