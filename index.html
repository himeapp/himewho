<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>himeapp</title>
  <style>
    :root {
      --bg: #0c0e12;
      --surface: #161a22;
      --text: #eef0f5;
      --muted: #8b92a0;
      --accent: #7c9cff;
      --accent-dim: rgba(124, 156, 255, 0.12);
      --radius: 18px;
      --fs-meta: 0.6875rem;
      --fs-card-sub: 0.75rem;
      --fs-card-title: 0.875rem;
      --lh-snug: 1.35;
      --lh-readable: 1.45;
      --text-card-title: rgba(238, 240, 245, 0.76);
      --text-card-sub: rgba(139, 146, 160, 0.52);
      --card-min-height: 8.1rem;
      --card-thumb-w: 9rem;
      --card-body-pad-x: 1.2rem;
      --card-app-icon-size: 5.35rem;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100dvh;
      font-family: system-ui, -apple-system, "Segoe UI", sans-serif;
      background: radial-gradient(ellipse 120% 80% at 50% -20%, rgba(124, 156, 255, 0.08), transparent 55%), var(--bg);
      color: var(--text);
      line-height: 1.5;
      padding: clamp(1.75rem, 6vw, 3rem);
      display: flex;
      flex-direction: column;
    }
    main { max-width: 36rem; margin: 0 auto; width: 100%; flex: 1; }
    .site-header {
      margin-bottom: 2rem;
      padding-bottom: 0.75rem;
      border-bottom: none;
    }
    .site-header::after {
      content: "";
      display: block;
      width: 1.25rem;
      height: 1px;
      background: rgba(139, 146, 160, 0.45);
      margin-top: 0.65rem;
      align-self: flex-start;
      flex-shrink: 0;
    }
    /* C: 워드마크 우선 — 큰 브랜드 + 작은 섹션 라벨(개성 유지). 카드만 공통 스케일. */
    .header-c {
      display: flex;
      flex-direction: column;
      gap: 0.65rem;
    }
    .header-c .wordmark {
      margin: 0;
      font-size: clamp(1.5rem, 4.8vw, 1.9rem);
      font-weight: 620;
      letter-spacing: -0.04em;
      line-height: 1.05;
      background: linear-gradient(105deg, #f0f2f8 0%, var(--accent) 55%, #b8c9ff 100%);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      text-decoration: none;
    }
    .header-c a.wordmark:hover {
      opacity: 0.92;
    }
    .header-c h1.section-label {
      margin: 0;
      display: flex;
      align-items: center;
      gap: 0.5rem;
      font-size: 0.625rem;
      font-weight: 600;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--muted);
    }
    .header-c h1.section-label::before {
      content: "";
      width: 1.25rem;
      height: 1px;
      background: rgba(139, 146, 160, 0.45);
    }
    ul {
      list-style: none;
      padding: 0;
      margin: 0;
      display: flex;
      flex-direction: column;
      gap: 1.2rem;
    }
    .card {
      display: flex;
      flex-direction: row;
      align-items: stretch;
      padding: 0;
      overflow: hidden;
      min-height: var(--card-min-height);
      background: var(--surface);
      border-radius: var(--radius);
      color: inherit;
      text-decoration: none;
      border: 1px solid rgba(255, 255, 255, 0.06);
      transition: border-color 0.15s ease, background 0.15s ease;
    }
    a.card:hover {
      border-color: rgba(124, 156, 255, 0.35);
      background: var(--accent-dim);
    }
    /* 앱: 웹과 같은 thumb 열(9rem) 안에서 스쿼클 아이콘 가로·세로 중앙 */
    .card--app {
      display: grid;
      grid-template-columns: var(--card-thumb-w) 1fr;
      align-items: stretch;
      padding: 0;
    }
    .card-app-thumb-slot {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100%;
    }
    .card--app .card-body--app {
      flex: initial;
      min-width: 0;
      padding: 1.05rem var(--card-body-pad-x);
      display: flex;
      flex-direction: column;
      justify-content: center;
    }
    .card-app-icon {
      flex: 0 0 auto;
      box-sizing: border-box;
      width: var(--card-app-icon-size);
      height: var(--card-app-icon-size);
      padding: 0;
      border-radius: 1.35rem;
      overflow: hidden;
      background: #0a0c10;
      border: 1px solid rgba(255, 255, 255, 0.08);
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .card-app-icon img {
      display: block;
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center;
      transform: none;
    }
    .card--app-ant .card-app-icon {
      background: #000;
      border-color: rgba(255, 255, 255, 0.1);
    }
    .card--app-mantra .card-app-icon {
      background: transparent;
      border-color: rgba(255, 255, 255, 0.1);
    }
    .card-thumb {
      flex: 0 0 var(--card-thumb-w);
      width: var(--card-thumb-w);
      background: #0a0c10;
      border-right: 1px solid rgba(255, 255, 255, 0.06);
      align-self: stretch;
      min-height: 4.25rem;
      overflow: hidden;
    }
    .card-thumb img {
      display: block;
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center;
      transform: scale(1.52);
    }
    .card-thumb.thumb-mind img {
      transform: scale(2.05);
    }
    .card-body {
      flex: 1;
      min-width: 0;
      min-height: 0;
      padding: 1.05rem var(--card-body-pad-x);
      display: flex;
      flex-direction: column;
      justify-content: center;
    }
    .card strong {
      display: block;
      font-size: var(--fs-card-title);
      font-weight: 560;
      letter-spacing: -0.01em;
      color: var(--text-card-title);
      line-height: var(--lh-snug);
      margin-bottom: 0.28rem;
    }
    /* 앱 카드: 타이틀 / 플랫폼 뱃지 그룹 — 모바일에서 세로로 나눠 정돈 */
    .card-body--app strong {
      display: flex;
      flex-direction: row;
      flex-wrap: wrap;
      align-items: baseline;
      gap: 0.35rem 0.5rem;
    }
    .card-body--app .card-app-title {
      min-width: 0;
    }
    .card-body--app .card-app-badges {
      display: inline-flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 0.35rem;
    }
    .card-body--app .card-app-badges .platform-badge {
      margin-left: 0;
    }
    /* 플랫폼 뱃지 — 타이틀 뒤 (괄호) 대신 */
    .platform-badge {
      display: inline-flex;
      align-items: center;
      margin-left: 0.35em;
      vertical-align: middle;
      position: relative;
      top: -0.04em;
      font-size: 0.72em;
      font-weight: 650;
      letter-spacing: 0.01em;
      line-height: 1;
      padding: 0.24em 0.62em 0.26em;
      border-radius: 999px;
      border: 1px solid transparent;
      white-space: nowrap;
    }
    .platform-badge--ios {
      color: #b4d4ff;
      background: rgba(64, 156, 255, 0.14);
      border-color: rgba(100, 170, 255, 0.38);
      box-shadow: 0 0 0 1px rgba(0, 0, 0, 0.2) inset;
    }
    .platform-badge--mac {
      color: #d8dde8;
      background: linear-gradient(180deg, rgba(255, 255, 255, 0.1) 0%, rgba(140, 150, 170, 0.08) 100%);
      border-color: rgba(200, 210, 230, 0.28);
      box-shadow: 0 1px 0 rgba(255, 255, 255, 0.06) inset;
    }
    .platform-badge--android {
      color: #9cf0c0;
      background: rgba(61, 220, 132, 0.12);
      border-color: rgba(61, 220, 132, 0.42);
      box-shadow: 0 0 0 1px rgba(0, 0, 0, 0.15) inset;
    }
    .card .card-sub {
      display: block;
      font-size: var(--fs-card-sub);
      color: var(--text-card-sub);
      line-height: var(--lh-readable);
    }
    .card .pet-wrap {
      display: inline-block;
      margin-left: 0.4em;
      vertical-align: middle;
    }
    .card .pet-hand {
      display: block;
      width: 1.34em;
      height: 1.34em;
      transform: rotate(26deg);
      transform-origin: 50% 55%;
    }
    /* 모바일: 썸네일 열·앱 아이콘 영역 축소 (가운데 정렬 로직은 동일) */
    @media (max-width: 480px) {
      :root {
        --card-thumb-w: 5.75rem;
        --card-app-icon-size: 3.65rem;
        --card-min-height: 6rem;
      }
      .card-thumb {
        min-height: 3rem;
      }
      .card-thumb img {
        transform: scale(1.35);
      }
      .card-thumb.thumb-mind img {
        transform: scale(1.78);
      }
      .card-body--app strong {
        flex-direction: column;
        align-items: flex-start;
        gap: 0.42rem;
      }
    }
  </style>
</head>
<body>
  <main>
    <header class="site-header header-c">
      <a class="wordmark" href="https://www.instagram.com/himeisreal/" target="_blank" rel="noopener noreferrer" aria-label="himeapp Instagram">himeapp</a>
    </header>
    <ul>

          <div class="card-body">

      </li>
      <li>
        <a class="card" href="https://taro-web-sigma.vercel.app/" target="_blank" rel="noopener noreferrer">
          <div class="card-thumb" aria-hidden="true">
            <img src="thumbnails/taro-web.png" alt="" width="320" height="180" loading="lazy" decoding="async" />
          </div>
          <div class="card-body">
            <strong>타로 보기</strong>
            <span class="card-sub">미래를 점쳐 보세요</span>
          </div>
        </a>
      </li>
    </ul>
  </main>
  <script>
    document.querySelectorAll("a.card--app-ant").forEach(function (el) {
      el.addEventListener("click", function (e) {
        e.preventDefault();
        alert("심사 중이에요.. 기다려 주세요!");
      });
    });
  </script>
</body>
</html>
