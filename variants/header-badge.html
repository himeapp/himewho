<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>himeapp — 만든 서비스 (뱃지)</title>
  <style>
    :root {
      --bg: #0c0e12;
      --surface: #161a22;
      --text: #eef0f5;
      --muted: #8b92a0;
      --accent: #7c9cff;
      --accent-dim: rgba(124, 156, 255, 0.12);
      --radius: 12px;
      --fs-meta: 0.6875rem;
      --fs-card-sub: 0.8125rem;
      --fs-card-title: 0.9375rem;
      --fs-heading: clamp(1.2rem, 3.2vw, 1.4rem);
      --lh-snug: 1.35;
      --lh-readable: 1.45;
      --text-card-title: rgba(238, 240, 245, 0.76);
      --text-card-sub: rgba(139, 146, 160, 0.52);
      --card-min-height: 7.75rem;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100dvh;
      font-family: system-ui, -apple-system, "Segoe UI", sans-serif;
      background: radial-gradient(ellipse 120% 80% at 50% -20%, rgba(124, 156, 255, 0.08), transparent 55%), var(--bg);
      color: var(--text);
      line-height: 1.5;
      padding: clamp(1.75rem, 6vw, 3rem);
      display: flex;
      flex-direction: column;
    }
    main { max-width: 36rem; margin: 0 auto; width: 100%; flex: 1; }
    .site-header {
      margin-bottom: 2rem;
      padding-bottom: 1.75rem;
      border-bottom: 1px solid rgba(255, 255, 255, 0.06);
    }
    /* A: 뱃지 + 얇은 룰 — 브랜드를 ‘칩’으로 고정, 제목은 그 아래 안정적으로 */
    .header-a {
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      gap: 1rem;
    }
    .header-a .brand-chip {
      display: inline-flex;
      align-items: center;
      padding: 0.35rem 0.75rem;
      border-radius: 999px;
      font-size: var(--fs-meta);
      font-weight: 650;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--accent);
      background: var(--accent-dim);
      border: 1px solid rgba(124, 156, 255, 0.22);
    }
    .header-a .rule {
      width: 2.5rem;
      height: 2px;
      border-radius: 1px;
      background: linear-gradient(90deg, var(--accent), transparent);
      opacity: 0.85;
    }
    .header-a .page-title {
      margin: 0;
      font-size: var(--fs-heading);
      font-weight: 600;
      letter-spacing: -0.03em;
      line-height: var(--lh-snug);
    }
    ul {
      list-style: none;
      padding: 0;
      margin: 0;
      display: flex;
      flex-direction: column;
      gap: 1.1rem;
    }
    a.card {
      display: flex;
      flex-direction: row;
      align-items: stretch;
      padding: 0;
      overflow: hidden;
      min-height: var(--card-min-height);
      background: var(--surface);
      border-radius: var(--radius);
      color: inherit;
      text-decoration: none;
      border: 1px solid rgba(255, 255, 255, 0.06);
      transition: border-color 0.15s ease, background 0.15s ease;
    }
    a.card:hover {
      border-color: rgba(124, 156, 255, 0.35);
      background: var(--accent-dim);
    }
    .card-thumb {
      flex: 0 0 9rem;
      width: 9rem;
      background: #0a0c10;
      border-right: 1px solid rgba(255, 255, 255, 0.06);
      align-self: stretch;
      min-height: 4.25rem;
    }
    .card-thumb img {
      display: block;
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center;
    }
    .card-body {
      flex: 1;
      min-width: 0;
      min-height: 0;
      padding: 0.9rem 1rem;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }
    a.card strong {
      display: block;
      font-size: var(--fs-card-title);
      font-weight: 560;
      letter-spacing: -0.01em;
      color: var(--text-card-title);
      line-height: var(--lh-snug);
      margin-bottom: 0.28rem;
    }
    a.card .card-sub {
      display: block;
      font-size: var(--fs-card-sub);
      color: var(--text-card-sub);
      line-height: var(--lh-readable);
    }
    a.card .pet-wrap {
      display: inline-block;
      margin-left: 0.4em;
      vertical-align: middle;
    }
    a.card .pet-hand {
      display: block;
      width: 1.34em;
      height: 1.34em;
      transform: rotate(26deg);
      transform-origin: 50% 55%;
    }
    .site-footer {
      max-width: 36rem;
      margin: 2.5rem auto 0;
      width: 100%;
      padding-top: 1.25rem;
      border-top: 1px solid rgba(255, 255, 255, 0.06);
      font-size: var(--fs-meta);
    }
    .site-footer a {
      color: rgba(139, 146, 160, 0.42);
      text-decoration: none;
      transition: color 0.15s ease;
    }
    .site-footer a:hover { color: rgba(139, 146, 160, 0.72); }
  </style>
</head>
<body>
  <main>
    <header class="site-header header-a">
      <span class="brand-chip">himeapp</span>
      <span class="rule" aria-hidden="true"></span>
      <h1 class="page-title">만든 서비스</h1>
    </header>
    <ul>
      <li>
        <a class="card" href="https://himeapp.github.io/pensive-web/mind-cleanse.html" target="_blank" rel="noopener noreferrer">
          <div class="card-thumb" aria-hidden="true">
            <img src="../thumbnails/mind-cleanse.png" alt="" width="320" height="180" loading="lazy" decoding="async" />
          </div>
          <div class="card-body">
            <strong>마음 정화 공간</strong>
            <span class="card-sub">의식을 구조화하고 쓰다듬어보세요<span class="pet-wrap"><svg class="pet-hand" viewBox="0 0 24 24" width="30" height="30" aria-hidden="true" xmlns="http://www.w3.org/2000/svg"><path fill="rgba(255, 255, 255, 0.34)" stroke="rgba(255, 255, 255, 0.62)" stroke-width="1.15" stroke-linecap="round" stroke-linejoin="round" d="M9 10.5V5c0-.8.65-1.45 1.45-1.45S12 4.2 12 5v5.5l.85-6.45c.1-.85.8-1.45 1.65-1.35.85.1 1.35.9 1.25 1.75L14 10.5l.65-5.2c.15-.85.95-1.4 1.8-1.25.85.15 1.35.95 1.2 1.8L16 12l.55-4.35c.15-.75.9-1.25 1.65-1.1.75.15 1.25.85 1.1 1.6l-2.1 7.4c-.55 1.95-2.35 3.35-4.45 3.35h-1.8c-2.15 0-3.9-1.75-3.9-3.9v-.75c0-1.05.85-1.9 1.9-1.9h.35z"/></svg></span></span>
          </div>
        </a>
      </li>
      <li>
        <a class="card" href="https://taro-web-sigma.vercel.app/" target="_blank" rel="noopener noreferrer">
          <div class="card-thumb" aria-hidden="true">
            <img src="../thumbnails/taro-web.png" alt="" width="320" height="180" loading="lazy" decoding="async" />
          </div>
          <div class="card-body">
            <strong>타로 보기</strong>
            <span class="card-sub">피드백 많이 주시면 용해져요</span>
          </div>
        </a>
      </li>
    </ul>
  </main>
  <footer class="site-footer">
    <a href="https://www.instagram.com/himeisreal/" target="_blank" rel="noopener noreferrer">@himeisreal</a>
  </footer>
</body>
</html>
