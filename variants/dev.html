<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>himeapp — 만든 서비스 (dev)</title>
  <style>
    :root {
      --bg: #0c0e12;
      --surface: #161a22;
      --text: #eef0f5;
      --muted: #8b92a0;
      --accent: #7c9cff;
      --accent-dim: rgba(124, 156, 255, 0.12);
      --radius: 12px;
      --shell-radius: 16px;
      --fs-meta: 0.6875rem;
      --fs-card-sub: 0.8125rem;
      --fs-card-title: 0.9375rem;
      --fs-heading: clamp(1.2rem, 3.2vw, 1.4rem);
      --fs-wordmark: clamp(1rem, 2.35vw, 1.1rem);
      --lh-snug: 1.35;
      --lh-readable: 1.45;
      --text-card-title: rgba(238, 240, 245, 0.76);
      --text-card-sub: rgba(139, 146, 160, 0.52);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100dvh;
      font-family: system-ui, -apple-system, "Segoe UI", sans-serif;
      background: radial-gradient(ellipse 120% 80% at 50% -20%, rgba(124, 156, 255, 0.08), transparent 55%), var(--bg);
      color: var(--text);
      line-height: 1.5;
      padding: clamp(1.75rem, 6vw, 3rem);
      display: flex;
      flex-direction: column;
    }
    /* 한 패널로 묶어 헤더·목록·푸터가 같은 리듬 */
    .shell {
      max-width: 36rem;
      margin: 0 auto;
      width: 100%;
      flex: 1;
      display: flex;
      flex-direction: column;
      padding: clamp(1.35rem, 4vw, 1.85rem);
      border-radius: var(--shell-radius);
      background: rgba(22, 26, 34, 0.42);
      border: 1px solid rgba(255, 255, 255, 0.055);
      box-shadow: 0 0 0 1px rgba(0, 0, 0, 0.2);
    }
    .site-header {
      margin: 0 0 1.1rem;
      padding: 0;
      border: none;
    }
    .dev-header {
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      gap: 0.35rem;
    }
    /* 워드마크: 눈에 띄되 카드 제목과 같은 ‘문단’ 크기권 */
    .dev-header .wordmark {
      margin: 0;
      font-size: var(--fs-wordmark);
      font-weight: 620;
      letter-spacing: -0.035em;
      line-height: var(--lh-snug);
      background: linear-gradient(102deg, #e8eaf0 0%, var(--accent) 52%, #a8b8f0 100%);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }
    /* 섹션 제목: 작은 라벨이 아니라 실제 헤딩 비중 */
    .dev-header h1 {
      margin: 0;
      font-size: var(--fs-heading);
      font-weight: 600;
      letter-spacing: -0.03em;
      line-height: var(--lh-snug);
      color: rgba(238, 240, 245, 0.82);
    }
    /* 헤더 ↔ 리스트 연결 */
    .list-bridge {
      margin: 0 0 1.1rem;
      height: 1px;
      border-radius: 1px;
      background: linear-gradient(
        90deg,
        rgba(124, 156, 255, 0.38) 0%,
        rgba(124, 156, 255, 0.1) 42%,
        transparent 100%
      );
    }
    ul.service-list {
      list-style: none;
      padding: 0;
      margin: 0;
      display: flex;
      flex-direction: column;
      gap: 1.1rem;
    }
    a.card {
      display: flex;
      flex-direction: row;
      align-items: stretch;
      padding: 0;
      overflow: hidden;
      min-height: 0;
      background: var(--surface);
      border-radius: var(--radius);
      color: inherit;
      text-decoration: none;
      border: 1px solid rgba(255, 255, 255, 0.06);
      transition: border-color 0.15s ease, background 0.15s ease;
    }
    a.card:hover {
      border-color: rgba(124, 156, 255, 0.35);
      background: var(--accent-dim);
    }
    .card-thumb {
      flex: 0 0 9rem;
      width: 9rem;
      background: #0a0c10;
      border-right: 1px solid rgba(255, 255, 255, 0.06);
      align-self: stretch;
      min-height: 4.25rem;
      overflow: hidden;
    }
    .card-thumb img {
      display: block;
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center;
      transform: scale(1.52);
    }
    .card-thumb.thumb-mind img {
      transform: scale(2.05);
    }
    .card-body {
      flex: 1;
      min-width: 0;
      min-height: 0;
      padding: 0.9rem 1rem;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }
    a.card strong {
      display: block;
      font-size: var(--fs-card-title);
      font-weight: 560;
      letter-spacing: -0.01em;
      color: var(--text-card-title);
      line-height: var(--lh-snug);
      margin-bottom: 0.28rem;
    }
    a.card .card-sub {
      display: block;
      font-size: var(--fs-card-sub);
      color: var(--text-card-sub);
      line-height: var(--lh-readable);
    }
    a.card .pet-wrap {
      display: inline-block;
      margin-left: 0.4em;
      vertical-align: middle;
    }
    a.card .pet-hand {
      display: block;
      width: 1.34em;
      height: 1.34em;
      transform: rotate(26deg);
      transform-origin: 50% 55%;
    }
    .site-footer {
      margin: 2rem 0 0;
      padding-top: 1.1rem;
      border-top: 1px solid rgba(255, 255, 255, 0.06);
      font-size: var(--fs-meta);
    }
    .site-footer a {
      color: rgba(139, 146, 160, 0.42);
      text-decoration: none;
      transition: color 0.15s ease;
    }
    .site-footer a:hover {
      color: rgba(139, 146, 160, 0.72);
    }
  </style>
</head>
<body>
  <main class="shell">
    <header class="site-header dev-header">
      <p class="wordmark">himeapp</p>
      <h1>만든 서비스</h1>
    </header>
    <div class="list-bridge" aria-hidden="true"></div>
    <ul class="service-list">
      <li>
        <a class="card" href="https://himeapp.github.io/pensive-web/mind-cleanse.html" target="_blank" rel="noopener noreferrer">
          <div class="card-thumb thumb-mind" aria-hidden="true">
            <img src="../thumbnails/mind-cleanse.png" alt="" width="320" height="180" loading="lazy" decoding="async" />
          </div>
          <div class="card-body">
            <strong>마음 정화 공간</strong>
            <span class="card-sub">의식의 흐름을 풀고 관념을 쓰다듬어보세요<span class="pet-wrap"><svg class="pet-hand" viewBox="0 0 24 24" width="30" height="30" aria-hidden="true" xmlns="http://www.w3.org/2000/svg"><path fill="rgba(255, 255, 255, 0.34)" stroke="rgba(255, 255, 255, 0.62)" stroke-width="1.15" stroke-linecap="round" stroke-linejoin="round" d="M9 10.5V5c0-.8.65-1.45 1.45-1.45S12 4.2 12 5v5.5l.85-6.45c.1-.85.8-1.45 1.65-1.35.85.1 1.35.9 1.25 1.75L14 10.5l.65-5.2c.15-.85.95-1.4 1.8-1.25.85.15 1.35.95 1.2 1.8L16 12l.55-4.35c.15-.75.9-1.25 1.65-1.1.75.15 1.25.85 1.1 1.6l-2.1 7.4c-.55 1.95-2.35 3.35-4.45 3.35h-1.8c-2.15 0-3.9-1.75-3.9-3.9v-.75c0-1.05.85-1.9 1.9-1.9h.35z"/></svg></span></span>
          </div>
        </a>
      </li>
      <li>
        <a class="card" href="https://taro-web-sigma.vercel.app/" target="_blank" rel="noopener noreferrer">
          <div class="card-thumb" aria-hidden="true">
            <img src="../thumbnails/taro-web.png" alt="" width="320" height="180" loading="lazy" decoding="async" />
          </div>
          <div class="card-body">
            <strong>타로 보기</strong>
            <span class="card-sub">피드백 많이 주시면 용해져요</span>
          </div>
        </a>
      </li>
    </ul>
    <footer class="site-footer">
      <a href="https://www.instagram.com/himeisreal/" target="_blank" rel="noopener noreferrer">@himeisreal</a>
    </footer>
  </main>
</body>
</html>
